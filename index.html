<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrokerFlow — RE Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05080f; /* Your Obsidian Blue */
            --surface: #0b121f;
            --border: #1e293b;
            --accent: #6366f1;
            --text: #f1f5f9;
            --muted: #64748b;
            --green: #00FFBB;
            --red: #ff3b5c;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
        }

        header { margin-bottom: 30px; }
        h1 { font-size: 28px; font-weight: 800; margin: 0; }
        h1 span { color: var(--accent); }
        p.subtitle { color: var(--muted); margin-top: 4px; font-size: 14px; }

        /* Stats Row */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .stat-value { font-size: 22px; font-weight: 800; margin-top: 5px; }

        /* Input Section */
        .form-container {
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            margin-bottom: 12px;
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn-add {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
        }

        /* Property Grid */
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .prop-card {
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            animation: fadeIn 0.4s ease;
        }

        .prop-info { padding: 20px; }
        .prop-type { 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            background: rgba(99, 102, 241, 0.1); 
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .prop-price { font-size: 24px; font-weight: 800; color: var(--green); margin-bottom: 5px; }
        .prop-addr { font-size: 14px; color: var(--text); font-weight: 500; opacity: 0.9; }

        .btn-delete {
            margin-top: 15px;
            background: none;
            border: 1px solid #ff3b5c33;
            color: var(--red);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Specific */
        @media (max-width: 600px) {
            .property-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Broker<span>Flow</span></h1>
        <p class="subtitle">Real Estate Portfolio Management</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Properties</div>
            <div class="stat-value" id="stat-count">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Value</div>
            <div class="stat-value" id="stat-value" style="color: var(--green);">$0</div>
        </div>
    </div>

    <div class="form-container">
        <h3 style="margin-top: 0; font-size: 16px;">Add New Listing</h3>
        <input type="text" id="address" placeholder="Address (e.g., Eretria, Greece)">
        <input type="number" id="price" placeholder="Price ($)">
        <select id="type">
            <option value="For Sale">For Sale</option>
            <option value="Rental">Long-term Rental</option>
            <option value="Airbnb">Airbnb Property</option>
        </select>
        <button class="btn-add" onclick="addProperty()">Add Property to List</button>
    </div>

    <div class="property-grid" id="grid">
        </div>

    <script>
        let properties = JSON.parse(localStorage.getItem('broker_data')) || [];

        function addProperty() {
            const addr = document.getElementById('address').value;
            const price = document.getElementById('price').value;
            const type = document.getElementById('type').value;

            if (!addr || !price) {
                alert("Please enter address and price");
                return;
            }

            const item = {
                id: Date.now(),
                address: addr,
                price: parseFloat(price),
                type: type
            };

            properties.unshift(item);
            save();
            
            // Clear inputs
            document.getElementById('address').value = '';
            document.getElementById('price').value = '';
        }

        function deleteProperty(id) {
            properties = properties.filter(p => p.id !== id);
            save();
        }

        function save() {
            localStorage.setItem('broker_data', JSON.stringify(properties));
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const statCount = document.getElementById('stat-count');
            const statValue = document.getElementById('stat-value');
            
            let totalVal = 0;
            statCount.innerText = properties.length;

            grid.innerHTML = properties.map(p => {
                totalVal += p.price;
                return `
                    <div class="prop-card">
                        <div class="prop-info">
                            <div class="prop-type">${p.type}</div>
                            <div class="prop-price">$${p.price.toLocaleString()}</div>
                            <div class="prop-addr">${p.address}</div>
                            <button class="btn-delete" onclick="deleteProperty(${p.id})">REMOVE LISTING</button>
                        </div>
                    </div>
                `;
            }).join('');

            statValue.innerText = `$${totalVal.toLocaleString()}`;
        }

        // Initial Load
        render();

        // Refresh sensor: If you add on one tab, it updates the other
        window.addEventListener('storage', render);
    </script>
</body>
</html>
